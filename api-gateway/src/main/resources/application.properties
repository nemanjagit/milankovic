spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=celestial-body-service
spring.cloud.gateway.routes[1].uri=lb://celestial-body-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/bodies/**

spring.cloud.gateway.routes[2].id=threat-tracker-service
spring.cloud.gateway.routes[2].uri=lb://threat-tracker-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/threats/**,/missions/**,/agencies/**,/rockets/**,/targets/**,/analytics/**

spring.cloud.gateway.routes[3].id=alert-service
spring.cloud.gateway.routes[3].uri=lb://alert-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/alerts/**

jwt.secret=milankovicSecretKey2024SuperLongSecretKeyForHS256Algorithm
